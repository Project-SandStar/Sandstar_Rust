  // Resizable divider between tree and palette
  (function() {
    var divider = document.getElementById('panel-divider');
    var treeSection = document.getElementById('tree-section');
    var paletteSection = document.getElementById('palette-section');
    var dragging = false;
    var startY, startTreeH;

    divider.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      dragging = true;
      startY = e.clientY;
      startTreeH = treeSection.offsetHeight;
      divider.setPointerCapture(e.pointerId);
    });

    divider.addEventListener('pointermove', function(e) {
      if (!dragging) return;
      var dy = e.clientY - startY;
      var newH = Math.max(80, Math.min(startTreeH + dy, leftPanel.offsetHeight - 120));
      treeSection.style.flex = 'none';
      treeSection.style.height = newH + 'px';
      paletteSection.style.flex = '1';
    });

    divider.addEventListener('pointerup', function() { dragging = false; });
    divider.addEventListener('lostpointercapture', function() { dragging = false; });
  })();

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', function(e) {
    var isInput = document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA';

    // Ctrl+Z = undo
    if (e.key === 'z' && (e.ctrlKey || e.metaKey) && !e.shiftKey && !isInput) {
      e.preventDefault();
      performUndo();
      return;
    }
    // Ctrl+Y or Ctrl+Shift+Z = redo
    if (((e.key === 'y' && (e.ctrlKey || e.metaKey)) || (e.key === 'z' && (e.ctrlKey || e.metaKey) && e.shiftKey)) && !isInput) {
      e.preventDefault();
      performRedo();
      return;
    }
    // Ctrl+A = select all
    if (e.key === 'a' && (e.ctrlKey || e.metaKey) && !isInput) {
      e.preventDefault();
      selectAll();
      return;
    }

    if (isInput) return;

    // Escape
    if (e.key === 'Escape') {
      hideContextMenu();
      clearSelection();
      propsPanel.classList.add('hidden');
    }
    // F = fit view
    if (e.key === 'f' || e.key === 'F') {
      if (!e.ctrlKey && !e.metaKey) Viewport.fitAll();
    }
    // L = toggle labels
    if (e.key === 'l' || e.key === 'L') {
      state.showWireLabels = !state.showWireLabels;
      WireRenderer.draw(null);
    }
    // A = toggle animation (only when ctrl not held)
    if ((e.key === 'a' || e.key === 'A') && !e.ctrlKey && !e.metaKey) {
      state.showFlowAnim = !state.showFlowAnim;
      if (state.showFlowAnim) startAnimLoop(); else stopAnimLoop();
    }
    // Delete/Backspace
    if (e.key === 'Delete' || e.key === 'Backspace') {
      e.preventDefault();
      deleteSelected();
    }
  });

  // ── Button handlers ──
  document.getElementById('btn-sidebar').addEventListener('click', function() {
    toggleSidebar();
  });
  document.getElementById('btn-zoom-in').addEventListener('click', function() {
    state.zoom = Math.min(MAX_ZOOM, state.zoom * 1.2);
    Viewport.update();
  });
  document.getElementById('btn-zoom-out').addEventListener('click', function() {
    state.zoom = Math.max(MIN_ZOOM, state.zoom / 1.2);
    Viewport.update();
  });
  document.getElementById('btn-fit').addEventListener('click', function() {
    Viewport.fitAll();
  });
  document.getElementById('btn-props-close').addEventListener('click', function() {
    propsPanel.classList.add('hidden');
  });

  // ── Zoom with scroll wheel ──
  workspace.addEventListener('wheel', function(e) {
    e.preventDefault();
    var delta = e.deltaY > 0 ? -0.1 : 0.1;
    var oldZoom = state.zoom;
    state.zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, state.zoom * (1 + delta)));
    var rect = workspace.getBoundingClientRect();
    var mx = e.clientX - rect.left;
    var my = e.clientY - rect.top;
    state.panX = mx - (mx - state.panX) * (state.zoom / oldZoom);
    state.panY = my - (my - state.panY) * (state.zoom / oldZoom);
    Viewport.update();
  }, {passive: false});

  // ── Pan with middle mouse or Space+drag ──
  var spaceDown = false;
  document.addEventListener('keydown', function(e) {
    if (e.code === 'Space' && document.activeElement.tagName !== 'INPUT') {
      spaceDown = true;
      workspace.style.cursor = 'grab';
      e.preventDefault();
    }
  });
  document.addEventListener('keyup', function(e) {
    if (e.code === 'Space') {
      spaceDown = false;
      workspace.style.cursor = '';
    }
  });

  workspace.addEventListener('pointerdown', function(e) {
    // Middle-mouse pan
    if (e.button === 1) {
      e.preventDefault();
      state.dragging = {type:'pan', startX: e.clientX, startY: e.clientY, startPanX: state.panX, startPanY: state.panY};
      workspace.style.cursor = 'grabbing';
      workspace.setPointerCapture(e.pointerId);
      return;
    }

    // Space + left-click pan
    if (e.button === 0 && spaceDown) {
      e.preventDefault();
      state.dragging = {type:'pan', startX: e.clientX, startY: e.clientY, startPanX: state.panX, startPanY: state.panY};
      workspace.style.cursor = 'grabbing';
      workspace.setPointerCapture(e.pointerId);
      return;
    }

    // Left-click on empty canvas: pan (default), or Ctrl+drag for box select
    if (e.button === 0 && !spaceDown && (e.target === workspace || e.target === canvas || e.target === nodeLayer)) {
      // First check if clicking a wire
      var wireIdx = hitTestWire(e.clientX, e.clientY);
      if (wireIdx >= 0) {
        clearSelection();
        state.selectedWire = wireIdx;
        WireRenderer.draw(null);
        e.preventDefault();
        return;
      }

      if (e.ctrlKey || e.metaKey) {
        // Ctrl+drag: box selection
        var wsRect = workspace.getBoundingClientRect();
        var startSX = e.clientX - wsRect.left;
        var startSY = e.clientY - wsRect.top;

        var boxEl = document.createElement('div');
        boxEl.className = 'selection-box';
        workspace.appendChild(boxEl);

        state.boxSelect = {
          startX: startSX, startY: startSY,
          el: boxEl,
          pointerId: e.pointerId,
          moved: false
        };
        workspace.setPointerCapture(e.pointerId);
      } else {
        // Default left-click drag: pan canvas
        e.preventDefault();
        state.dragging = {type:'pan', startX: e.clientX, startY: e.clientY, startPanX: state.panX, startPanY: state.panY, clicked: true};
        workspace.style.cursor = 'grabbing';
        workspace.setPointerCapture(e.pointerId);
      }
    }
  });

  workspace.addEventListener('pointermove', function(e) {
    // Pan dragging
    if (state.dragging && state.dragging.type === 'pan') {
      state.panX = state.dragging.startPanX + (e.clientX - state.dragging.startX);
      state.panY = state.dragging.startPanY + (e.clientY - state.dragging.startY);
      Viewport.update();
    }

    // Box selection dragging
    if (state.boxSelect) {
      var wsRect = workspace.getBoundingClientRect();
      var curX = e.clientX - wsRect.left;
      var curY = e.clientY - wsRect.top;
      var bx = Math.min(state.boxSelect.startX, curX);
      var by = Math.min(state.boxSelect.startY, curY);
      var bw = Math.abs(curX - state.boxSelect.startX);
      var bh = Math.abs(curY - state.boxSelect.startY);
      state.boxSelect.el.style.left = bx + 'px';
      state.boxSelect.el.style.top = by + 'px';
      state.boxSelect.el.style.width = bw + 'px';
      state.boxSelect.el.style.height = bh + 'px';
      if (bw > 3 || bh > 3) state.boxSelect.moved = true;
    }

    // Update pending wire mouse pos
    if (state.pendingWire) {
      state.pendingWire.mouseX = e.clientX;
      state.pendingWire.mouseY = e.clientY;
      WireRenderer.draw(null);
    }
  });

  workspace.addEventListener('pointerup', function(e) {
    if (state.dragging && state.dragging.type === 'pan') {
      // If user just clicked without moving, deselect everything
      if (state.dragging.clicked) {
        var dx = Math.abs(e.clientX - state.dragging.startX);
        var dy = Math.abs(e.clientY - state.dragging.startY);
        if (dx < 3 && dy < 3) {
          clearSelection();
          state.selectedWire = -1;
          propsPanel.classList.add('hidden');
          WireRenderer.draw(null);
        }
      }
      state.dragging = null;
      workspace.style.cursor = '';
    }

    // Box selection end
    if (state.boxSelect) {
      var bs = state.boxSelect;
      var wsRect = workspace.getBoundingClientRect();
      var curX = e.clientX - wsRect.left;
      var curY = e.clientY - wsRect.top;

      if (bs.moved) {
        var sx1 = Math.min(bs.startX, curX);
        var sy1 = Math.min(bs.startY, curY);
        var sx2 = Math.max(bs.startX, curX);
        var sy2 = Math.max(bs.startY, curY);

        if (!e.ctrlKey) clearSelection();

        state.nodes.forEach(function(nodeEl, cid) {
          var comp = state.components.get(cid);
          if (!comp || !isCanvasComponent(comp)) return;
          var nodePos = getNodePos(nodeEl);
          var screenPos = Viewport.worldToScreen(nodePos.x, nodePos.y);
          var nw = (nodeEl.offsetWidth || 180) * state.zoom;
          var nh = (nodeEl.offsetHeight || 100) * state.zoom;
          if (screenPos.x + nw > sx1 && screenPos.x < sx2 && screenPos.y + nh > sy1 && screenPos.y < sy2) {
            state.selection.add(cid);
            nodeEl.classList.add('selected');
          }
        });
        if (state.selection.size > 0) {
          toast('Selected ' + state.selection.size + ' component' + (state.selection.size > 1 ? 's' : ''), 'info');
        }
      } else {
        clearSelection();
        propsPanel.classList.add('hidden');
      }

      bs.el.remove();
      state.boxSelect = null;
    }

    // Complete pending wire
    if (state.pendingWire) {
      var target = document.elementFromPoint(e.clientX, e.clientY);
      if (target && target.classList.contains('port')) {
        var srcDir = state.pendingWire.sourcePort.getAttribute('data-dir');
        var dstDir = target.getAttribute('data-dir');
        if (srcDir !== dstDir) {
          var fromPort = srcDir === 'out' ? state.pendingWire.sourcePort : target;
          var toPort = srcDir === 'in' ? state.pendingWire.sourcePort : target;
          var fc = parseInt(fromPort.getAttribute('data-comp-id'));
          var fs = parseInt(fromPort.getAttribute('data-slot-idx'));
          var tc = parseInt(toPort.getAttribute('data-comp-id'));
          var ts = parseInt(toPort.getAttribute('data-slot-idx'));
          API.addLink(fc, fs, tc, ts).then(function() {
            toast('Link created', 'success');
            pushUndo({type:'add_link', fromComp:fc, fromSlot:fs, toComp:tc, toSlot:ts});
            refreshAll();
          }).catch(function(err) {
            toast('Failed to create link: ' + err.message, 'error');
          });
        }
      }
      state.pendingWire = null;
      WireRenderer.draw(null);
    }
  });

  // Port drag to create wires
  document.addEventListener('pointerdown', function(e) {
    if (e.target.classList.contains('port') && e.button === 0 && !spaceDown) {
      e.stopPropagation();
      e.preventDefault();
      state.pendingWire = {
        sourcePort: e.target,
        mouseX: e.clientX,
        mouseY: e.clientY
      };
    }
  }, true);

  // ── Window resize ──
  window.addEventListener('resize', function() { Viewport.resize(); });

  // ── Batch fetch with concurrency limit ──
  function fetchAllDetails(compIds, concurrency) {
    concurrency = concurrency || 6;
    var results = new Map();
    var idx = 0;
    return new Promise(function(resolve, reject) {
      var active = 0;
      var done = false;
      function next() {
        if (done) return;
        while (active < concurrency && idx < compIds.length) {
          (function(cid) {
            active++;
            API.getComp(cid).then(function(detail) {
              results.set(cid, detail);
              active--;
              if (idx >= compIds.length && active === 0) {
                done = true;
                resolve(results);
              } else {
                next();
              }
            }).catch(function(err) {
              console.warn('Failed to fetch comp ' + cid + ':', err);
              active--;
              if (idx >= compIds.length && active === 0) {
                done = true;
                resolve(results);
              } else {
                next();
              }
            });
          })(compIds[idx]);
          idx++;
        }
      }
      if (compIds.length === 0) { resolve(results); return; }
      next();
    });
  }

  // ── Refresh all data ──
  function refreshAll() {
    return API.getTree().then(function(treeData) {
      var comps = treeData.components || [];
      state.components.clear();
      var nonSystemIds = [];
      for (var i = 0; i < comps.length; i++) {
        var comp = comps[i];
        state.components.set(comp.compId, comp);
        if (!comp.isSystem) {
          nonSystemIds.push(comp.compId);
        }
      }
      return fetchAllDetails(nonSystemIds).then(function(details) {
        state.compDetails = details;
        state.links = collectLinks(details);
        nodeLayer.innerHTML = '';
        state.nodes.clear();
        var prevSelection = new Set(state.selection);
        state.selection.clear();
        state.selectedWire = null;

        // ONLY render canvas components (not channel, not system)
        nonSystemIds.forEach(function(cid) {
          var comp = state.components.get(cid);
          if (!isCanvasComponent(comp)) return; // Skip channel components
          var detail = state.compDetails.get(cid);
          var el = createNodeElement(comp, detail);
          nodeLayer.appendChild(el);
          state.nodes.set(cid, el);
          if (prevSelection.has(cid)) {
            state.selection.add(cid);
            el.classList.add('selected');
          }
        });
        markConnectedPorts(state.links);
        WireRenderer.draw(null);
        if (state.showFlowAnim) startAnimLoop();

        // Rebuild the tree navigator
        buildTree();

        return comps;
      });
    });
  }

  // ── Init ──
  function init() {
    Viewport.resize();
    toast('Loading editor...', 'info', 2000);

    var treePromise = API.getTree();
    var palettePromise = API.getPalette();

    treePromise.then(function(treeData) {
      var comps = treeData.components || [];
      state.components.clear();
      var nonSystemIds = [];
      var canvasIds = [];
      for (var i = 0; i < comps.length; i++) {
        var comp = comps[i];
        state.components.set(comp.compId, comp);
        if (!comp.isSystem) {
          nonSystemIds.push(comp.compId);
          if (isCanvasComponent(comp)) {
            canvasIds.push(comp.compId);
          }
        }
      }

      connStatus.textContent = 'Loading ' + canvasIds.length + ' components...';

      return fetchAllDetails(nonSystemIds).then(function(details) {
        state.compDetails = details;
        state.links = collectLinks(details);

        // ONLY render canvas components (user control logic)
        canvasIds.forEach(function(cid) {
          var comp = state.components.get(cid);
          var detail = state.compDetails.get(cid);
          var el = createNodeElement(comp, detail);
          nodeLayer.appendChild(el);
          state.nodes.set(cid, el);
        });

        markConnectedPorts(state.links);
        WireRenderer.draw(null);

        // Build tree navigator
        buildTree();

        requestAnimationFrame(function() {
          Viewport.fitAll();
          if (state.showFlowAnim) startAnimLoop();
        });

        return comps;
      });
    }).then(function(comps) {
      return palettePromise.then(function(paletteData) {
        state.palette = paletteData;
        populatePalette('');
        liveDot.classList.add('connected');
        var canvasCount = 0;
        state.components.forEach(function(c) { if (isCanvasComponent(c)) canvasCount++; });
        connStatus.textContent = canvasCount + ' on canvas, ' + comps.length + ' total';
        toast('Loaded ' + canvasCount + ' control components, ' + state.links.length + ' wires', 'success');
        LiveData.connect();
      });
    }).catch(function(err) {
      console.error('Failed to load:', err);
      liveDot.classList.add('error');
      connStatus.textContent = 'Error';
      toast('Failed to connect: ' + err.message, 'error', 5000);
    });
  }

  // ── LiveData: WebSocket real-time value updates ──
  var LiveData = {
    ws: null, watchId: null, reconnectDelay: 1000, reconnectTimer: null,
    maxReconnectDelay: 30000, pingTimer: null,
    channelMap: new Map(),

    connect: function() {
      if (this.ws && this.ws.readyState <= 1) return;
      var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      var url = protocol + '//' + location.host + '/api/ws';
      var self = this;
      this.ws = new WebSocket(url);

      this.ws.onopen = function() {
        liveDot.classList.remove('error');
        liveDot.classList.add('connected');
        self.reconnectDelay = 1000;
        self.pingTimer = setInterval(function() {
          if (self.ws && self.ws.readyState === 1) self.ws.send(JSON.stringify({op:'ping'}));
        }, 30000);
        self.buildChannelMap();
        self.subscribeAll();
      };

      this.ws.onmessage = function(evt) {
        try {
          var msg = JSON.parse(evt.data);
          if (msg.op === 'subscribed') { self.watchId = msg.watchId; self.handleRows(msg.rows); }
          else if (msg.op === 'update' || msg.op === 'snapshot') { self.handleRows(msg.rows); }
        } catch(e) { console.error('WS parse:', e); }
      };

      this.ws.onclose = function() {
        liveDot.classList.remove('connected');
        liveDot.classList.add('error');
        connStatus.textContent = 'Disconnected';
        clearInterval(self.pingTimer);
        self.watchId = null;
        self.reconnectTimer = setTimeout(function() {
          self.reconnectDelay = Math.min(self.reconnectDelay * 2, self.maxReconnectDelay);
          self.connect();
        }, self.reconnectDelay);
      };
    },

    buildChannelMap: function() {
      this.channelMap.clear();
      state.components.forEach(function(comp, compId) {
        if (!comp.isChannel) return;
        var m = comp.name.match(/^ch_?(\d+)$/);
        if (!m) return;
        var chId = parseInt(m[1], 10);
        if (chId <= 0) return;
        var detail = state.compDetails ? state.compDetails.get(compId) : null;
        if (detail && detail.slots) {
          for (var i = 0; i < detail.slots.length; i++) {
            if (detail.slots[i].name === 'out') {
              var arr = LiveData.channelMap.get(chId) || [];
              arr.push({compId: compId, slotIdx: detail.slots[i].index});
              LiveData.channelMap.set(chId, arr);
              break;
            }
          }
        }
      });
      // Also map user ConstFloat "chXXXX" bridges
      state.components.forEach(function(comp, compId) {
        if (comp.isChannel || comp.isSystem) return;
        var m = comp.name.match(/^ch(\d{3,5})$/);
        if (!m) return;
        var chId = parseInt(m[1], 10);
        var detail = state.compDetails ? state.compDetails.get(compId) : null;
        if (detail && detail.slots) {
          for (var i = 0; i < detail.slots.length; i++) {
            if (detail.slots[i].direction === 'out') {
              var arr = LiveData.channelMap.get(chId) || [];
              arr.push({compId: compId, slotIdx: detail.slots[i].index});
              LiveData.channelMap.set(chId, arr);
              break;
            }
          }
        }
      });
    },

    subscribeAll: function() {
      if (!this.ws || this.ws.readyState !== 1) return;
      var ids = Array.from(this.channelMap.keys());
      if (ids.length === 0) return;
      this.ws.send(JSON.stringify({op:'subscribe', ids:ids, pollInterval:1000}));
    },

    handleRows: function(rows) {
      if (!rows || !rows.length) return;
      for (var i = 0; i < rows.length; i++) {
        var row = rows[i];
        var targets = this.channelMap.get(row.channel);
        if (!targets) continue;
        for (var j = 0; j < targets.length; j++) {
          var t = targets[j];
          // Update in-memory
          var detail = state.compDetails ? state.compDetails.get(t.compId) : null;
          if (detail && detail.slots) {
            for (var k = 0; k < detail.slots.length; k++) {
              if (detail.slots[k].index === t.slotIdx) { detail.slots[k].value = row.cur; break; }
            }
          }
          // Update DOM node (if on canvas)
          var nodeEl = state.nodes.get(t.compId);
          if (nodeEl) {
            var valEls = nodeEl.querySelectorAll('.node-slot[data-slot-idx="' + t.slotIdx + '"] .slot-value');
            valEls.forEach(function(valSpan) {
              var formatted = formatSlotValue(row.cur, 'float');
              if (valSpan.textContent !== formatted) {
                valSpan.textContent = formatted;
                valSpan.classList.add('changed');
                setTimeout(function() { valSpan.classList.remove('changed'); }, 400);
              }
            });
          }
          // Update tree leaf value
          var treeLeaf = treeView.querySelector('.tree-item[data-comp-id="' + t.compId + '"] .value');
          if (treeLeaf) {
            var fmtVal = formatSlotValue(row.cur, 'float');
            if (treeLeaf.textContent !== fmtVal) {
              treeLeaf.textContent = fmtVal;
            }
          }
        }
      }
    },

    disconnect: function() {
      clearInterval(this.pingTimer);
      clearTimeout(this.reconnectTimer);
      if (this.ws) { this.ws.close(); this.ws = null; }
    }
  };

  init();
})();
</script>
</body>
</html>
