# Cross.toml — cross-rs Docker configuration
# Used by: BUILD_MODE=cross ./tools/build-rust.sh
#
# The BeagleBone runs Debian 9 (stretch) with glibc 2.24.
# Default cross images use Ubuntu 20.04+ (glibc 2.31) which would produce
# binaries that fail with "GLIBC_2.28 not found" on the device.
#
# Solution: Use cross 0.2.5+ default images which target older glibc,
# or pin a specific image version.

[target.armv7-unknown-linux-gnueabihf]
# cross 0.2.5+ uses images with glibc 2.17 (CentOS 7 based) — compatible with Debian 9
# If you need a specific image, uncomment:
# image = "ghcr.io/cross-rs/armv7-unknown-linux-gnueabihf:0.2.5"

[build.env]
# Pass through env vars to the Docker container
passthrough = [
    "SANDSTAR_CONFIG_DIR",
]
