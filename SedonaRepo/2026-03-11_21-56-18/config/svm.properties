

#haystack options

listen = 127.0.0.1
port = 8085
maxQueued = 100
maxThreads = 16

#Logger options
#
# Log levels (from most verbose to least):
#   DEBUG   - All messages including detailed debug info (use during development/troubleshooting)
#   INFO    - Informational messages, warnings, and errors (recommended for normal operations)
#   WARNING - Warnings and errors only (use to reduce log noise)
#   ERR     - Errors only (use to see only critical problems)
#   NONE    - No logging except CRIT/ALERT/EMERG (minimal logging)
#
# These levels match syslog/journalctl priorities:
#   - View logs: journalctl -u sandstar -f
#   - Filter by priority: journalctl -u sandstar -p err (shows ERR and above)
#   - Available priorities: emerg, alert, crit, err, warning, notice, info, debug
#
# Engine (C code) respects this level setting - set to INFO for production
# to avoid excessive debug logs in the main loop and message handling.

level = DEBUG
filter = ALL

#Enable/Disable components

engine=false
sedona=true
haystack=true


#POCO Settings

haystack.timerPeriod=1
haystack.timerWatches=1
haystack.timerHistory=60